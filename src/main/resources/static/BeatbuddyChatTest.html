<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatBuddy 채팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f5f5f7;
            --white: #ffffff;
            --primary: #5b5ef4;
            --primary-light: #eeeeff;
            --text: #1a1a2e;
            --text-sub: #8e8e93;
            --border: #e5e5ea;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
            --danger: #e53935;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* 로그인 */
        #login-panel { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--white); border-radius: 20px; padding: 40px; width: 360px; box-shadow: var(--shadow); }
        .login-card h2 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .login-card .sub { font-size: 13px; color: var(--text-sub); margin-bottom: 28px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
        .login-btn:hover { opacity: 0.85; }
        .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .error-msg { font-size: 13px; color: var(--danger); margin-top: 10px; text-align: center; min-height: 20px; }

        /* 메인 */
        #main { display: none; width: 100%; height: 100vh; }
        #room-list-panel { width: 360px; min-width: 360px; height: 100vh; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-header { padding: 24px 20px 12px; border-bottom: 1px solid var(--border); }
        .panel-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .panel-header .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 2px; }
        #room-list { flex: 1; overflow-y: auto; }
        .room-item { display: flex; align-items: center; padding: 16px 20px; cursor: pointer; border-bottom: 1px solid var(--border); gap: 14px; transition: background 0.15s; }
        .room-item:hover { background: var(--bg); }
        .room-item.active { background: var(--primary-light); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; font-weight: 700; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .room-info { flex: 1; min-width: 0; }
        .room-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
        .room-last-msg { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .room-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .room-time { font-size: 11px; color: var(--text-sub); }
        .unread-badge { background: var(--primary); color: white; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center; }
        .new-chat-btn { margin: 12px 20px; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .new-chat-btn:hover { opacity: 0.85; }

        /* 채팅 */
        #chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        #chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); }
        #chat-empty .icon { font-size: 48px; margin-bottom: 12px; }
        #chat-room { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: var(--white); padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); }
        .chat-header .name { font-size: 17px; font-weight: 700; color: var(--text); }
        .chat-header .status { font-size: 12px; color: var(--text-sub); }
        .conn-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
        .conn-status.connected { background: #e8f5e9; color: #2e7d32; }
        .conn-status.disconnected { background: #fce4ec; color: #c62828; }
        .exit-btn { padding: 8px 14px; background: none; border: 1.5px solid var(--danger); border-radius: 8px; color: var(--danger); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-left: auto; }
        .exit-btn:hover { background: var(--danger); color: white; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; flex-direction: column; }
        .msg-row.me { align-items: flex-end; }
        .msg-row.other { align-items: flex-start; }
        .msg-sender { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; padding: 0 4px; }
        .msg-bubble-wrap { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.me .msg-bubble-wrap { flex-direction: row-reverse; }
        .msg-bubble { max-width: 280px; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .msg-row.me .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-row.other .msg-bubble { background: var(--white); color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .msg-time { font-size: 11px; color: var(--text-sub); flex-shrink: 0; }
        .msg-unread { font-size: 11px; color: var(--primary); font-weight: 600; flex-shrink: 0; }
        .chat-input-area { background: var(--white); padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 24px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); outline: none; background: var(--bg); transition: border-color 0.2s; }
        #message-input:focus { border-color: var(--primary); }
        #message-input::placeholder { color: var(--text-sub); }
        #message-input:disabled { background: #f0f0f0; color: var(--text-sub); cursor: not-allowed; }
        #send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; flex-shrink: 0; }
        #send-btn:hover { opacity: 0.85; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #send-btn svg { width: 18px; height: 18px; fill: white; }

        /* 모달 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-card { background: var(--white); border-radius: 20px; padding: 28px; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .modal-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
        .modal-card p { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); outline: none; margin-bottom: 12px; }
        .modal-input:focus { border-color: var(--primary); }
        .modal-btns { display: flex; gap: 8px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .modal-btn.primary { background: var(--primary); color: white; }
        .modal-btn.secondary { background: var(--border); color: var(--text); }
        .modal-btn.danger { background: var(--danger); color: white; }
        .modal-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-panel">
    <div class="login-card">
        <h2>🎵 BeatBuddy</h2>
        <p class="sub">채팅 테스트를 위해 로그인해주세요</p>
        <div class="form-group">
            <label>이메일</label>
            <input class="form-input" id="login-email" type="email" placeholder="이메일 입력"/>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input class="form-input" id="login-password" type="password" placeholder="비밀번호 입력"
                   onkeydown="if(event.key==='Enter') login()"/>
        </div>
        <div class="error-msg" id="login-error"></div>
        <button class="login-btn" id="login-btn" onclick="login()">로그인</button>
    </div>
</div>

<!-- 메인 -->
<div id="main">
    <div id="room-list-panel">
        <div class="panel-header">
            <h1>채팅 💬</h1>
            <div class="subtitle" id="current-user-label"></div>
        </div>
        <button class="new-chat-btn" onclick="openNewChatModal()">+ 새 채팅 시작</button>
        <div id="room-list"></div>
    </div>
    <div id="chat-panel">
        <div id="chat-empty">
            <div class="icon">💬</div>
            <p>채팅방을 선택해주세요</p>
        </div>
        <div id="chat-room">
            <div class="chat-header">
                <div class="avatar" id="chat-avatar"></div>
                <div>
                    <div class="name" id="chat-name"></div>
                    <div class="status">온라인</div>
                </div>
                <span class="conn-status disconnected" id="conn-status">● 연결 안됨</span>
                <button class="exit-btn" onclick="openExitModal()">나가기</button>
            </div>
            <div id="messages"></div>
            <div class="chat-input-area">
                <input id="message-input" type="text" placeholder="메시지를 입력하세요..."
                       onkeydown="if(event.key==='Enter') sendMessage()"/>
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 새 채팅 모달 -->
<div class="modal-overlay" id="new-chat-modal">
    <div class="modal-card">
        <h3>새 채팅 시작</h3>
        <input class="modal-input" type="number" id="opponent-id-input" placeholder="상대방 userId 입력"/>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closeNewChatModal()">취소</button>
            <button class="modal-btn primary" onclick="startNewChat()">시작</button>
        </div>
    </div>
</div>

<!-- 나가기 확인 모달 -->
<div class="modal-overlay" id="exit-modal">
    <div class="modal-card">
        <h3>채팅방 나가기</h3>
        <p>채팅방을 나가면 목록에서 사라집니다. 나가시겠어요?</p>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closeExitModal()">취소</button>
            <button class="modal-btn danger" onclick="exitChatRoom()">나가기</button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8080';
    let accessToken = null;
    let loginUserId = null;
    let loginNickname = null;
    let stompClient = null;
    let subscription = null;
    let eventSubscription = null;
    let currentRoomId = null;

    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');
        if (!email || !password) { errorEl.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
        btn.disabled = true;
        btn.textContent = '로그인 중...';
        errorEl.textContent = '';
        try {
            const res = await fetch(`${BASE_URL}/api/v1/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) {
                accessToken = data.result.accessToken;
                loginUserId = data.result.userId;
                loginNickname = data.result.nickname;
                onLoginSuccess();
            } else {
                errorEl.textContent = data.message || '로그인 실패';
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        } catch(e) {
            errorEl.textContent = '서버 연결 실패';
            btn.disabled = false;
            btn.textContent = '로그인';
        }
    }

    function onLoginSuccess() {
        document.getElementById('login-panel').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('current-user-label').textContent = `${loginNickname} (ID: ${loginUserId})`;
        connectWebSocket();
        loadRoomList();
    }

    function connectWebSocket() {
        const socket = new SockJS(`${BASE_URL}/ws/chat`);
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect(
            { Authorization: `Bearer ${accessToken}` },
            function() {
                setConnectionStatus(true);
                subscribeEventChannel();
            },
            function() { setConnectionStatus(false); }
        );
    }

    function subscribeEventChannel() {
        eventSubscription = stompClient.subscribe(`/sub/events/${loginUserId}`, function(msg) {
            const event = JSON.parse(msg.body);
            console.log('이벤트 수신:', event);
            handleEvent(event);
        });
    }

    function handleEvent(event) {
        switch(event.type) {
            case 'NEW_MESSAGE':
                loadRoomList();
                // 현재 채팅방에서 온 메시지면 입력창 열기 (상대방 재입장 시)
                if (currentRoomId === event.roomId) {
                    setInputDisabled(false);
                }
                break;

            case 'MESSAGE_READ':
                // "1" 제거
                if (currentRoomId === event.roomId) {
                    document.querySelectorAll('.msg-unread').forEach(el => el.remove());
                }
                loadRoomList();
                break;

            case 'OPPONENT_EXITED':
                if (currentRoomId === event.roomId) {
                    setInputDisabled(true);
                }
                loadRoomList();
                break;
        }
    }

    async function loadRoomList() {
        try {
            const res = await fetch(`${BASE_URL}/api/v1/chat/rooms`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const data = await res.json();
            renderRoomList(data.result || []);
        } catch(e) { console.error('채팅방 목록 조회 실패', e); }
    }

    function renderRoomList(rooms) {
        const el = document.getElementById('room-list');
        if (rooms.length === 0) {
            el.innerHTML = '<div style="padding:24px;text-align:center;color:#8e8e93;font-size:14px;">채팅방이 없습니다</div>';
            return;
        }
        el.innerHTML = rooms.map(room => {
            const imgUrl = room.opponentProfileImageUrl
                ? `${BASE_URL}${room.opponentProfileImageUrl}`
                : null;
            return `
                <div class="room-item" id="room-${room.roomId}" onclick="enterRoom(${room.roomId}, '${room.opponentNickname}', '${room.opponentProfileImageUrl || ''}', this)">
                    <div class="avatar">
                        ${imgUrl
                ? `<img src="${imgUrl}" alt="${room.opponentNickname}"/>`
                : room.opponentNickname?.charAt(0) || '?'
            }
                    </div>
                    <div class="room-info">
                        <div class="room-name">${room.opponentNickname}</div>
                        <div class="room-last-msg">${room.lastMessageText || ''}</div>
                    </div>
                    <div class="room-meta">
                        <div class="room-time">${formatTime(room.lastMessageAt)}</div>
                        ${room.unreadCount > 0 ? `<div class="unread-badge">${room.unreadCount}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        if (currentRoomId) {
            const activeEl = document.getElementById(`room-${currentRoomId}`);
            if (activeEl) activeEl.classList.add('active');
        }
    }

    async function enterRoom(roomId, opponentName, opponentImageUrl, el) {
        currentRoomId = roomId;
        document.getElementById('chat-empty').style.display = 'none';
        document.getElementById('chat-room').style.display = 'flex';
        document.getElementById('chat-name').textContent = opponentName;

        const avatarEl = document.getElementById('chat-avatar');
        const imgUrl = opponentImageUrl ? `${BASE_URL}${opponentImageUrl}` : null;
        if (imgUrl) {
            avatarEl.innerHTML = `<img src="${imgUrl}" alt="${opponentName}"/>`;
        } else {
            avatarEl.textContent = opponentName?.charAt(0) || '?';
        }

        document.querySelectorAll('.room-item').forEach(e => e.classList.remove('active'));
        el?.classList.add('active');

        if (subscription) subscription.unsubscribe();
        subscription = stompClient.subscribe(`/sub/chat/rooms/${roomId}`, function(msg) {
            const body = JSON.parse(msg.body);
            console.log('메시지 수신:', body);  // 여기!
            appendMessage(body);

            // 상대방 메시지면 읽음처리
            if (body.senderId !== loginUserId) {
                stompClient.send('/pub/chat/read', {}, JSON.stringify({ roomId: currentRoomId }));
            }
        });

        try {
            const res = await fetch(`${BASE_URL}/api/v1/chat/${roomId}/messages`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const data = await res.json();
            renderMessages(data.result?.messages || []);

            // 채팅방 목록 unread 갱신
            loadRoomList();

            if (data.result?.opponentExited) {
                setInputDisabled(true);
            } else {
                setInputDisabled(false);
            }
        } catch(e) { console.error('메시지 조회 실패', e); }
    }

    function setInputDisabled(disabled) {
        document.getElementById('message-input').disabled = disabled;
        document.getElementById('message-input').placeholder = disabled
            ? '상대방이 채팅방을 나갔습니다.'
            : '메시지를 입력하세요...';
        document.getElementById('send-btn').disabled = disabled;
    }

    function renderMessages(messages) {
        const el = document.getElementById('messages');
        el.innerHTML = '';
        messages.forEach(msg => appendMessage(msg, false));
        el.scrollTop = el.scrollHeight;
    }

    function appendMessage(msg, scroll = true) {
        const el = document.getElementById('messages');
        const isMe = msg.senderId === loginUserId;
        const time = formatTime(msg.createdAt);
        const div = document.createElement('div');
        div.className = `msg-row ${isMe ? 'me' : 'other'}`;
        div.dataset.messageId = msg.messageId;
        div.innerHTML = `
            ${!isMe ? `<div class="msg-sender">${msg.senderNickname || ''}</div>` : ''}
            <div class="msg-bubble-wrap">
                ${isMe && msg.isRead === false ? `<div class="msg-unread">1</div>` : ''}
                <div class="msg-bubble">${msg.messageText}</div>
                <div class="msg-time">${time}</div>
            </div>
        `;
        el.appendChild(div);
        if (scroll) el.scrollTop = el.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !currentRoomId || !stompClient) return;
        stompClient.send('/pub/chat/message', {}, JSON.stringify({
            roomId: currentRoomId,
            messageText: text
        }));
        input.value = '';
        setTimeout(() => loadRoomList(), 300);
    }

    function openExitModal() { document.getElementById('exit-modal').classList.add('show'); }
    function closeExitModal() { document.getElementById('exit-modal').classList.remove('show'); }

    async function exitChatRoom() {
        try {
            const res = await fetch(`${BASE_URL}/api/v1/chat/${currentRoomId}/exit`, {
                method: 'PATCH',
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            if (res.ok) {
                closeExitModal();
                document.getElementById('chat-room').style.display = 'none';
                document.getElementById('chat-empty').style.display = 'flex';
                if (subscription) { subscription.unsubscribe(); subscription = null; }
                currentRoomId = null;
                loadRoomList();
            }
        } catch(e) { alert('나가기 실패'); }
    }

    function openNewChatModal() { document.getElementById('new-chat-modal').classList.add('show'); }
    function closeNewChatModal() {
        document.getElementById('new-chat-modal').classList.remove('show');
        document.getElementById('opponent-id-input').value = '';
    }

    async function startNewChat() {
        const opponentId = document.getElementById('opponent-id-input').value;
        if (!opponentId) return;
        try {
            const res = await fetch(`${BASE_URL}/api/v1/chat/rooms`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${accessToken}` },
                body: JSON.stringify({ opponentUserId: parseInt(opponentId) })
            });
            const data = await res.json();
            closeNewChatModal();
            await loadRoomList();
            const roomEl = document.getElementById(`room-${data.result.roomId}`);
            enterRoom(data.result.roomId, data.result.opponentNickname, data.result.opponentProfileImageUrl || '', roomEl);
        } catch(e) { alert('채팅방 생성 실패'); }
    }

    function setConnectionStatus(connected) {
        const el = document.getElementById('conn-status');
        if (!el) return;
        el.className = `conn-status ${connected ? 'connected' : 'disconnected'}`;
        el.textContent = connected ? '● 연결됨' : '● 연결 안됨';
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }
</script>
